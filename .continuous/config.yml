# The agent and the variants it serves. `src/variants.ts` reads this at worker
# startup to learn the agent name and the variant list (one model × prompt × skill
# composition per variant, under agent/variants/<name>/).
#
# This is the sample's own manifest — the platform does not parse it. CI is driven
# by API-managed Triggers (`continuous trigger create`, 0003 §4.1.9 / §15.7), not by
# a config file; datasets and judges live under datasets/ and are pushed with
# `continuous dataset create` (0004 §8.3).
agents:
  - name: support-agent-ts
    variants:
      - name: v1
      - name: v2
