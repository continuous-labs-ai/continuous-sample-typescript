agents:
  - name: support-agent
    variants:
      # Each variant is a full model × prompt × skill composition. The `paths`
      # globs scope CI: on the PR path the on:auto triage step runs a variant's
      # eval cell only when the diff touches that variant's files (0002 §3.1).
      # CLI `continuous eval` has no diff, so on:auto dispatches every variant.
      - name: v1
        paths:
          - "agent/variants/v1/**"
      - name: v2
        paths:
          - "agent/variants/v2/**"

evals:
  - name: billing-support
    agent: support-agent
    dataset: evals/support.jsonl
    judge: evals/judge.md
    on: auto
    dispatch: on-demand
    block_pr: true
  - name: tone
    agent: support-agent
    dataset: evals/tone.jsonl
    judge: evals/tone-judge.md
    on: auto
    dispatch: on-demand
    block_pr: false
