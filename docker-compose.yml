# Setup 2 — run the agent as a production-like deployment (preview/production
# regime). The worker is pinned to a deploy SHA (CONTINUOUS_GIT_SHA) so its queue
# matches a PR Run's sha:<head_sha>. Normally driven by Tilt (which builds the
# image with a tightly-scoped context); see Tiltfile.
services:
  worker:
    image: continuous-sample-typescript-worker
    build:
      context: ..
      dockerfile: continuous-sample-typescript/Dockerfile
    env_file: .env
    environment:
      # The SDK authenticates with the worker key via CONTINUOUS_API_KEY (.env).
      CONTINUOUS_API_KEY: ${CONTINUOUS_API_KEY:-}
      # Preview/production deploy: set to the PR head SHA for the CI demo so the
      # worker lands on queue sha:<head_sha>. Tilt sets this from `git_sha`.
      CONTINUOUS_GIT_SHA: ${CONTINUOUS_GIT_SHA:?set CONTINUOUS_GIT_SHA to the deploy/PR head SHA}
      # The SDK's in-process rubric judge scores claimed tasks against your own
      # judge model endpoint. The key falls back to ANTHROPIC_API_KEY (.env); the
      # base URL has an SDK default. The judge model comes from each rubric's
      # `[judge].model`, not the environment.
      CONTINUOUS_JUDGE_API_KEY: ${CONTINUOUS_JUDGE_API_KEY:-}
      CONTINUOUS_JUDGE_BASE_URL: ${CONTINUOUS_JUDGE_BASE_URL:-}

  # Production-traffic simulator for the replay/shadow/monitor demos
  # (queue-independent — it reports tasks rather than polling). Start on demand:
  #   docker compose --profile traffic up simulate
  simulate:
    image: continuous-sample-typescript-worker
    build:
      context: ..
      dockerfile: continuous-sample-typescript/Dockerfile
    env_file: .env
    environment:
      CONTINUOUS_API_KEY: ${CONTINUOUS_API_KEY:-}
    command: ["npm", "run", "simulate", "--", "40"]
    profiles: ["traffic"]
